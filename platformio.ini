; PlatformIO Project Configuration File

[env:cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
monitor_eol = CRLF
monitor_filters = esp32_exception_decoder
board_build.partitions = src/partitions.csv

build_src_filter = +<*> -<Camera_old/*>

board_build.f_flash = 40000000
board_build.f_cpu = 240000000L
build_flags = 
    -Os              ; optimise pour la taille
    -ffunction-sections
    -fno-inline-small-functions
    -fdata-sections
    -Wl,-Map,firmware.map,--gc-sections
    -DCORE_DEBUG_LEVEL=3
    -D CONFIG_ESP_FACE_DETECT_ENABLED=0
    -D CONFIG_ESP_FACE_RECOGNITION_ENABLED=0
;lib_ldf_mode = chain+
;    -D CONFIG_BT_ENABLED=0
;    -D CONFIG_BLE_ENABLED=0

lib_deps =
  bblanchon/ArduinoJson
  ESP32Async/AsyncTCP 
  ESP32Async/ESPAsyncWebServer
  https://github.com/gilmaimon/ArduinoWebsockets.git

  ;ClosedCube/ClosedCube HDC1080 @ ^1.1.1